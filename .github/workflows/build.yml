name: build Momiji for macOS

on: 
  push:
    branches:
      - '*test'

jobs:
  macos1007-1008:
    name: build for macOS 10.7-10.8
    runs-on: macos-26
    if: ${{ !endsWith(github.event.head_commit.message, 'DONTBUILD') }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      
      - name: Restore cached sccache
        id: restore-sccache-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/Library/Caches/Mozilla.sccache 
          key: ${{ runner.os }}-ld64-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-ld64-
      
      - name: Restore cached mozbuild toolchains
        id: restore-mozbuild-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/.mozbuild
          key: ${{ runner.os }}-mozbuild-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-mozbuild-
      
      - name: Bootstrap build deps
        id: bootstrap-build-deps
        run: |
          if [ ! -d "$HOME/.mozbuild" ]; then
            echo "Cached .mozbuild toolchain not found. Starting bootstrap..."
            /usr/bin/python3 ./mach bootstrap --application-choice=browser
        
            # Tạo thư mục tạm để lưu các toolchain quan trọng
            mkdir -p ~/tmp_toolchains
            
            # Di chuyển các thư mục cần thiết ra ngoài (dùng -f để tránh hỏi)
            [ -d "$HOME/.mozbuild/node" ] && mv "$HOME/.mozbuild/node" ~/tmp_toolchains/
            [ -d "$HOME/.mozbuild/sccache" ] && mv "$HOME/.mozbuild/sccache" ~/tmp_toolchains/
            [ -d "$HOME/.mozbuild/cbindgen" ] && mv "$HOME/.mozbuild/cbindgen" ~/tmp_toolchains/
            [ -d "$HOME/.mozbuild/clang" ] && mv "$HOME/.mozbuild/clang" ~/tmp_toolchains/
            [ -d "$HOME/.mozbuild/sysroot-wasm32-wasi" ] && mv "$HOME/.mozbuild/sysroot-wasm32-wasi" ~/tmp_toolchains/
            
            # Xóa sạch toàn bộ thư mục .mozbuild cũ (vốn chứa nhiều rác)
            rm -rf "$HOME/.mozbuild"
        
            # Đổi tên thư mục tạm thành .mozbuild
            mv ~/tmp_toolchains "$HOME/.mozbuild"
            
            # echo "Bootstrap finished. Kept: nodejs, sccache, cbindgen, nasm, dump_syms, clang, sysroot-wasm32-wasi"
            echo "Bootstrap finished. Kept: nodejs, sccache, cbindgen, clang, sysroot-wasm32-wasi"
          fi

          # Install nasm from Homebrew
          brew install nasm
      
      - name: Saving mozbuild toolchain cache
        id: save-mozbuild-cache
        if: steps.restore-mozbuild-cache.outputs.cache-matched-key == ''
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          key: ${{ runner.os }}-mozbuild-${{ github.run_id }}
          path: ~/.mozbuild

      - name: Bootstrap Rust toolchain
        id: bootstrap-rust
        run: |
          rustup install nightly-2025-08-07   # v1.91.0-nightly
          rustup default nightly-2025-08-07   
          rustup override set nightly-2025-08-07

          # Add support for cross compiling for x86_64-apple-darwin target
          rustup target add x86_64-apple-darwin

          # Verify Rust installation
          cargo --version
          rustc --version
      
      - name: Create mozconfig build config from template
        run: ln -sf ./mozconfig-cicd_1007-1008.sh mozconfig
      
      - name: Configure build options
        run: /usr/bin/python3 ./mach configure

      - name: Build
        run: /usr/bin/python3 ./mach build

      - name: End sccache session
        run: sleep 60 && $HOME/.mozbuild/sccache/sccache --stop-server

      - name: Export the DMG image
        run: /usr/bin/python3 ./mach package
      
      - name: Saving sccache
        id: save-sccache-cache
        if: always()
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          key: ${{ runner.os }}-ld64-${{ github.run_id }}
          path: ~/Library/Caches/Mozilla.sccache
      
      - name: Polyfill & Repackage
        id: polyfill-and-repkg
        run: |
          # Choose your branding here, Momiji or Nightly
          export BRAND="Nightly"
          # Get the current Momiji version
          export VERSION=$(cat browser/config/version.txt)

          if [ "$BRAND" = "Nightly" ]; then
            hdiutil attach -noverify "obj-ff-dbg/dist/firefox-${VERSION}.en-US.mac.dmg"  
            cp -R /Volumes/Nightly/Nightly.app /tmp
          else
            hdiutil attach -noverify "obj-ff-dbg/dist/momiji-${VERSION}.en-US.mac.dmg"  
            cp -R /Volumes/Momiji/Momiji.app /tmp 
          fi         

          # Build libMacportsLegacySystem.B.dylib (patched to support CCRandomGenerateBytes and exp10)
          git clone --recursive --branch 1.5.2_addCCRandom https://github.com/aobaharuki2005/macports-legacy-support.git
          cd macports-legacy-support

          CC="clang --target=x86_64-apple-macos10.6" \
          CXX="clang++ --target=x86_64-apple-macos10.6" \
          CFLAGS="-Os" \
          CXXFLAGS="-Os" \
          LDFLAGS="--target=x86_64-apple-macos10.6" \
          make

          if [ "$BRAND" = "Nightly" ]; then
            cp lib/libMacportsLegacySystem.B.dylib /tmp/Nightly.app/Contents/MacOS
            cd /tmp/Nightly.app/Contents/MacOS/  # Nightly
          else
            cp lib/libMacportsLegacySystem.B.dylib /tmp/Momiji.app/Contents/MacOS
            cd /tmp/Momiji.app/Contents/MacOS/   # Momiji
          fi
          
          # On macOS 10.7, CoreText.framework is located inside ApplicationServices.framework, so we need to polyfill it in XUL
          install_name_tool -change "/System/Library/Frameworks/CoreText.framework/Versions/A/CoreText" "/System/Library/Frameworks/ApplicationServices.framework/Versions/A/ApplicationServices" "XUL"

          # Polyfill XUL, libmozavutil.dylib and libgkcodecs.dylib
          install_name_tool -change "/usr/lib/libSystem.B.dylib" "@executable_path/libMacportsLegacySystem.B.dylib" "XUL"
          install_name_tool -change "/usr/lib/libSystem.B.dylib" "@executable_path/libMacportsLegacySystem.B.dylib" "libmozavutil.dylib"
          install_name_tool -change "/usr/lib/libSystem.B.dylib" "@executable_path/libMacportsLegacySystem.B.dylib" "libgkcodecs.dylib"

          # Package the output app
          cd /tmp
          if [ "$BRAND" = "Nightly" ]; then
            zip -qr "Nightly-${VERSION}_macOS10.7-10.8.zip" Nightly.app   # Nightly
          else
            zip -qr "Momiji-${VERSION}_macOS10.7-10.8.zip" Momiji.app    # Momiji
          fi
      
      - name: Upload Momiji for macOS 10.7-10.8 build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          archive: false
          path: /tmp/*.zip
          if-no-files-found: error
          retention-days: 7

